<!DOCTYPE html>
<html>
<head>
    <title>Weather Assignment 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="titleMain">⛅ Async Weather Tracker</h1>

    <div class="topContainer">

        <div class="cardOne">
            <h3>Search City</h3>

            <div class="searchWrap">
                <input type="text" id="cityInputBox" placeholder="Delhi, Mumbai">
                <button id="searchButtonNow">Search</button>
            </div>

            <h3>Search History</h3>
            <div id="historyAreaBox"></div>
        </div>

        <div class="cardTwo">
            <h3>Weather Information</h3>
            <div id="weatherDisplayResult"></div>
        </div>

    </div>

    <div class="consoleOuter">
        <h3>Console — Event Loop</h3>
        <div id="consoleBlackScreen"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
